spring.application.name=solimus
server.port=8082

spring.datasource.url=jdbc:mysql://${DB_HOST:db}:${DB_PORT:3306}/${DB_NAME:solimus}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
spring.datasource.username=${DB_USER:solimus}
spring.datasource.password=${DB_PASSWORD:solimus}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Configuration Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.enabled=true
springdoc.packages-to-scan=com.example.solimus.controllers
springdoc.show-actuator=false

jwt.secret=${JWT_SECRET:solimus-secret-key-256-bits-minimum-required-for-security-2026}
jwt.expiration=${JWT_EXPIRATION:86400000}
activation.code.expiration.minutes=${ACTIVATION_CODE_EXPIRATION_MINUTES:15}
activation.code.resend.cooldown.seconds=${ACTIVATION_CODE_RESEND_COOLDOWN_SECONDS:30}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:smtp.gmail.com}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:10000}

mail.from=${MAIL_FROM:admin@solimus.com}
mail.app.name=${MAIL_APP_NAME:Solimus}

# URLs frontend (redirections email)
app.frontend.base-url=${FRONTEND_BASE_URL:https://solimus.example.com/}
app.backend.base-url=${BACKEND_BASE_URL:https://api.solimus.example.com}

app.frontend.reset-password-url=${FRONTEND_RESET_PASSWORD_URL:https://solimus.example.com/create-password?token=}
app.frontend.activation-url=${FRONTEND_ACTIVATION_URL:https://solimus.example.com/create-password?token=}

# Taille maximale des fichiers
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Configuration MinIO
minio.url=${MINIO_URL:https://minio.example.com}
minio.access-key=${MINIO_ACCESS_KEY:access_key}
minio.secret-key=${MINIO_SECRET_KEY:secret_key}
minio.bucket=${MINIO_BUCKET:solimus-bucket}

# Reverse Proxy
server.forward-headers-strategy=framework

# ============================================================================
# CONFIGURATION ABONNEMENTS PRESTATAIRES
# ============================================================================
# Tarif abonnement Premium
solimus.subscription.premium.price=${SUBSCRIPTION_PREMIUM_PRICE:35000}

# Rayon de recherche des prestataires A proximitE (en km)
solimus.geolocation.search-radius-km=${GEOLOCATION_SEARCH_RADIUS_KM:30.0}

# Limite de devis mensuels pour les prestataires en formule gratuite
solimus.subscription.free.max-quotes-per-month=${SUBSCRIPTION_FREE_MAX_QUOTES_PER_MONTH:3}

# ============================================================================
# CONFIGURATION TOUCHPAY
# ============================================================================
touchpay.hosted.script-url=${TOUCHPAY_HOSTED_SCRIPT_URL:https://touchpay.gutouch.net/touchpayv2/script/touchpaynr/prod_touchpay-0.0.1.js}
touchpay.agency-code=${TOUCHPAY_AGENCY_CODE:SOLI26685}
touchpay.token=${TOUCHPAY_TOKEN:SJeOJiLKfP2FUHWgTEzhX8Y0km36CwGkbJQTKdplZM3QORfQ6m}
touchpay.hosted.domain-name=${TOUCHPAY_DOMAIN_NAME:solimus.net}
touchpay.hosted.success-redirect-url=${TOUCHPAY_SUCCESS_REDIRECT_URL:https://api.solimus.innovimpactdev.cloud/payment-success.html}
touchpay.hosted.failed-redirect-url=${TOUCHPAY_FAILED_REDIRECT_URL:https://api.solimus.innovimpactdev.cloud/payment-failed.html}
touchpay.hosted.default-city=${TOUCHPAY_DEFAULT_CITY:Dakar}
touchpay.callback-url=${TOUCHPAY_CALLBACK_URL:https://api.solimus.innovimpactdev.cloud/api/payments/intouch/callback}
app.touchpay.bridge-url=https://api.solimus.innovimpactdev.cloud/touchpay-bridge.html?ref=%s&apiBaseUrl=https://api.solimus.innovimpactdev.cloud

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-exception=true
server.error.include-stacktrace=always

