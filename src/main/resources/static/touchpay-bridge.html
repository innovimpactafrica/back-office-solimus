<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SOLIMUS — Paiement</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .loader-container {
            text-align: center;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2a538b;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #loading {
            font-size: 16px;
            color: #333;
        }
        #errorBox {
            background-color: #fee;
            border: 1px solid #fcc;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>

    <!-- 📌 Script officiel TouchPay  -->
    <script src="https://touchpay.gutouch.net/touchpayv2/script/touchpaynr/prod_touchpay-0.0.1.js"
            type="text/javascript"></script>

    <script type="text/javascript">

        // =========================================
        // 🧠 VARIABLES GLOBALES (remplies plus tard)
        // =========================================
        // Elles vont recevoir les infos venant du backend
        let dynamicTransactionRef = '';   // référence du paiement (PAY-123)
        let dynamicAmount = 0;            // montant à payer
        let dynamicAgencyCode = '';       // code agence TouchPay
        let dynamicServiceId = '';       // service TouchPay
        let dynamicMerchantToken = '';   // token de sécurité
        let dynamicEmail = '';           // email client
        let dynamicFirstName = '';       // prénom client
        let dynamicLastName = '';        // nom client
        let dynamicPhone = '';           // téléphone client
        let dynamicSuccessUrl = '';      // redirection succès
        let dynamicFailedUrl = '';       // redirection échec


        // =========================================
        //  Récupérer la référence dans l’URL
        // Exemple : ?ref=PAY-123456
        // =========================================
        function getRef() {
            const params = new URLSearchParams(window.location.search);
            return params.get('ref');
        }


        // =========================================
        //Récupérer l’URL du backend
        // Exemple : ?apiBaseUrl=http://localhost:8585
        // =========================================
        function getApiBaseUrl() {
            const params = new URLSearchParams(window.location.search);
            const apiBaseUrl = params.get('apiBaseUrl');

            return apiBaseUrl && apiBaseUrl.trim()
                ? apiBaseUrl.trim().replace(/\/+$/, '')
                : window.location.origin; // fallback
        }


        // =========================================
        // 🧭 Construire l’URL API selon le type de paiement
        // =========================================
        // PAY- / SOL- → paiement normal
        // SUB- → abonnement
        // WIT- → retrait wallet
        // CPY- → paiement charge
        // ECP- -> paiement charge exceptionnelle
        function getApiUrl(ref, apiBaseUrl) {
            if (ref.startsWith('PAY-') || ref.startsWith('SOL-')) {
                return `${apiBaseUrl}/api/payments/bridge/payment/${ref}`;
            } else if (ref.startsWith('SUB-')) {
                return `${apiBaseUrl}/api/payments/bridge/subscription/${ref}`;
            } else if (ref.startsWith('WIT-')) {
                return `${apiBaseUrl}/api/payments/bridge/withdrawal/${ref}`;
            } else if (ref.startsWith('CPY-')) {
                return `${apiBaseUrl}/api/payments/bridge/charge/${ref}`;
            }else if (ref.startsWith('ECP-')) {
            return `${apiBaseUrl}/api/payments/bridge/exceptional-charge/${ref}`;
        }

            // si format inconnu
            return null;
        }


        // =========================================
        // Charger les données depuis le backend
        // =========================================
        async function loadPaymentData() {

            const ref = getRef();                 // récupérer PAY-xxx
            const apiBaseUrl = getApiBaseUrl();   // récupérer backend

            const loading = document.getElementById('loading');
            const errorBox = document.getElementById('errorBox');

            // si pas de référence dans l’URL
            if (!ref) {
                loading.style.display = 'none';
                errorBox.style.display = 'block';
                errorBox.innerText = 'Erreur : paramètre ?ref= manquant dans l\'URL.';
                return;
            }

            // construire l’URL API
            const apiUrl = getApiUrl(ref, apiBaseUrl);

            if (!apiUrl) {
                loading.style.display = 'none';
                errorBox.style.display = 'block';
                errorBox.innerText = 'Erreur : référence invalide — ' + ref;
                return;
            }

            try {
                // 📡 appel backend pour récupérer les infos de paiement
                const res = await fetch(apiUrl, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });

                const text = await res.text();

                if (!res.ok) {
                    throw new Error(`Erreur serveur (${res.status}): ${text}`);
                }

                // 🔄 convertir réponse en JSON
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    throw new Error('Réponse invalide du serveur.');
                }

                // 🧠 remplir les variables globales avec les données backend
                dynamicTransactionRef = String(data.transactionReference || '');
                dynamicAmount         = Number(data.amount || 0);
                dynamicAgencyCode     = String(data.agencyCode || '');
                dynamicServiceId      = String(data.serviceId || '');
                dynamicMerchantToken  = String(data.merchantToken || '');
                dynamicEmail          = String(data.customerEmail || '');
                dynamicFirstName      = String(data.customerFirstName || '');
                dynamicLastName       = String(data.customerLastName || '');
                dynamicSuccessUrl     = String(data.successRedirectUrl || '');
                dynamicFailedUrl      = String(data.failedRedirectUrl || '');

                // 📞 nettoyage du téléphone (garder uniquement chiffres +)
                let rawPhone = data.customerPhone || '';
                dynamicPhone = String(rawPhone).replace(/[^\d+]/g, '');

                // ✅ cacher loading et lancer TouchPay directement
                loading.style.display = 'none';
                calltouchpay();

            } catch (error) {
                // ❌ en cas d’erreur backend
                loading.style.display = 'none';
                errorBox.style.display = 'block';
                errorBox.innerText = `Erreur : ${error.message}`;
            }
        }


        // =========================================
        // 💳 Lancer le paiement TouchPay
        // =========================================
        function calltouchpay() {

            // ❌ sécurité : vérifier que les données sont chargées
            if (!dynamicTransactionRef || dynamicAmount === 0) {
                alert('Erreur : les informations de paiement ne sont pas chargées.');
                return;
            }

            // 🚀 appel du script TouchPay 
            sendPaymentInfos(
                dynamicTransactionRef,  // référence paiement
                dynamicAgencyCode,      // code agence
                dynamicMerchantToken,   // token sécurité
                dynamicServiceId,       // service TouchPay
                dynamicSuccessUrl,      // URL succès
                dynamicFailedUrl,       // URL échec
                dynamicAmount,          // montant
                'Dakar',                // ville
                dynamicEmail,           // email client
                dynamicFirstName,       // prénom
                dynamicLastName,        // nom
                dynamicPhone            // téléphone
            );
        }


        // =========================================
        // 🚀 exécution automatique au chargement page
        // =========================================
        window.onload = () => {
            setTimeout(loadPaymentData, 100);
        };

    </script>
</head>

<body>

<div class="loader-container">
    <!-- ⏳ Spinner animé -->
    <div id="loading">
        <div class="spinner"></div>
        <div>Chargement du paiement...</div>
    </div>

    <!-- ❌ affichage des erreurs -->
    <div id="errorBox" style="display:none;"></div>
</div>

</body>
</html>
