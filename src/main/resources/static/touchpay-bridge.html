<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SOLIMUS — Paiement</title>

    <!-- Script officiel TouchPay -->
    <script src="https://touchpay.gutouch.net/touchpayv2/script/touchpaynr/prod_touchpay-0.0.1.js"
            type="text/javascript"></script>

    <script type="text/javascript">

        // Variables globales — remplies dynamiquement depuis le back
        let dynamicTransactionRef = '';
        let dynamicAmount = 0;
        let dynamicAgencyCode = '';
        let dynamicServiceId = '';
        let dynamicMerchantToken = '';
        let dynamicEmail = '';
        let dynamicFirstName = '';
        let dynamicLastName = '';
        let dynamicPhone = '';
        let dynamicSuccessUrl = '';
        let dynamicFailedUrl = '';

        // Récupère la référence depuis l'URL (?ref=PAY-123456)
        function getRef() {
            const params = new URLSearchParams(window.location.search);
            return params.get('ref');
        }

        // Récupère l'URL de base de l'API (?apiBaseUrl=http://localhost:8080)
        function getApiBaseUrl() {
            const params = new URLSearchParams(window.location.search);
            const apiBaseUrl = params.get('apiBaseUrl');
            return apiBaseUrl && apiBaseUrl.trim()
                ? apiBaseUrl.trim().replace(/\/+$/, '')
                : window.location.origin;
        }

        // Détermine le bon endpoint selon le préfixe de la référence
        // PAY- ou SOL- → paiement syndic
        // SUB-          → abonnement prestataire
        // WIT-          → retrait wallet
        function getApiUrl(ref, apiBaseUrl) {
            if (ref.startsWith('PAY-') || ref.startsWith('SOL-')) {
                return `${apiBaseUrl}/api/payments/bridge/payment/${ref}`;
            } else if (ref.startsWith('SUB-')) {
                return `${apiBaseUrl}/api/payments/bridge/subscription/${ref}`;
            } else if (ref.startsWith('WIT-')) {
                return `${apiBaseUrl}/api/payments/bridge/withdrawal/${ref}`;
            }
            return null;
        }

        // Charge les données depuis le back et prépare TouchPay
        async function loadPaymentData() {
            const ref = getRef();
            const apiBaseUrl = getApiBaseUrl();
            const loading = document.getElementById('loading');
            const errorBox = document.getElementById('errorBox');
            const btn = document.getElementById('btnContinuer');

            // Vérifier que la référence est présente dans l'URL
            if (!ref) {
                loading.style.display = 'none';
                errorBox.style.display = 'block';
                errorBox.innerText = 'Erreur : paramètre ?ref= manquant dans l\'URL.';
                return;
            }

            // Déterminer l'URL de l'API selon le type de paiement
            const apiUrl = getApiUrl(ref, apiBaseUrl);
            if (!apiUrl) {
                loading.style.display = 'none';
                errorBox.style.display = 'block';
                errorBox.innerText = 'Erreur : référence invalide — ' + ref;
                return;
            }

            try {
                // Appel GET vers le back pour récupérer les paramètres TouchPay
                const res = await fetch(apiUrl, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });

                const text = await res.text();

                if (!res.ok) {
                    throw new Error(`Erreur serveur (${res.status}): ${text}`);
                }

                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    throw new Error('Réponse invalide du serveur.');
                }

                // Remplir les variables globales avec les données du back
                dynamicTransactionRef = String(data.transactionReference || '');
                dynamicAmount         = Number(data.amount || 0);
                dynamicAgencyCode     = String(data.agencyCode || '');
                dynamicServiceId      = String(data.serviceId || '');
                dynamicMerchantToken  = String(data.merchantToken || '');
                dynamicEmail          = String(data.customerEmail || '');
                dynamicFirstName      = String(data.customerFirstName || '');
                dynamicLastName       = String(data.customerLastName || '');
                dynamicSuccessUrl     = String(data.successRedirectUrl || '');
                dynamicFailedUrl      = String(data.failedRedirectUrl || '');

                // Nettoyage du téléphone (garder uniquement chiffres et +)
                let rawPhone = data.customerPhone || '';
                dynamicPhone = String(rawPhone).replace(/[^\d+]/g, '');

                // Tout est prêt — afficher le bouton
                loading.style.display = 'none';
                btn.style.display = 'inline-block';

            } catch (error) {
                loading.style.display = 'none';
                errorBox.style.display = 'block';
                errorBox.innerText = `Erreur : ${error.message}`;
            }
        }

        // Déclenche le paiement TouchPay
        function calltouchpay() {
            if (!dynamicTransactionRef || dynamicAmount === 0) {
                alert('Erreur : les informations de paiement ne sont pas chargées.');
                return;
            }

            sendPaymentInfos(
                dynamicTransactionRef,  // référence unique (PAY-123456)
                dynamicAgencyCode,      // SOLI26685
                dynamicMerchantToken,   // token sécurisé
                dynamicServiceId,       // TouchPay
                dynamicSuccessUrl,      // URL succès
                dynamicFailedUrl,       // URL échec
                dynamicAmount,          // montant
                'Dakar',                // ville
                dynamicEmail,           // email client
                dynamicFirstName,       // prénom
                dynamicLastName,        // nom
                dynamicPhone            // téléphone
            );
        }

        // Charger les données dès l'ouverture de la page
        window.onload = () => {
            setTimeout(loadPaymentData, 100);
        };
    </script>
</head>
<body>

    <div id="loading">Chargement du paiement...</div>
    <div id="errorBox" style="display:none; color:red;"></div>

    <input type="button"
           id="btnContinuer"
           onclick="calltouchpay()"
           value="Continuer"
           style="display:none;
                  background-color: rgb(42, 83, 139);
                  color: white;
                  border-radius: 8px;
                  height: 30px;
                  border: none;
                  cursor: pointer;
                  padding: 0 20px;" />

</body>
</html>
