version: '3.8'

services:
  # ==========================================
  # SERVICE 1 : LA BASE DE DONNÉES (MySQL)
  # ==========================================
  db:
    image: mysql:8.0
    container_name: solimus-db
    environment:
      MYSQL_DATABASE: ${DB_NAME:-solimus}
      MYSQL_USER: ${DB_USER:-solimus}
      MYSQL_PASSWORD: ${DB_PASSWORD:-solimus}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
    ports:
      - "3308:3306"
    volumes:
      - solimus_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - solimus-network

  # ==========================================
  # SERVICE 2 : L'APPLICATION SPRING BOOT
  # ==========================================
  app:
    build: .
    container_name: solimus-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker

      # Connexion à la base (cohérent avec MySQL)
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${DB_NAME:-solimus}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-solimus}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-solimus}

      # Dialecte MySQL forcé
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQL8Dialect

      # Clé JWT
      JWT_SECRET: ${JWT_SECRET:-solimus-secret-key-256-bits-minimum-required-for-security-2026}

      # Configuration Email
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      # Configuration MinIO
      MINIO_URL: ${MINIO_URL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}

    ports:
      - "8086:8082"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - solimus-network

# ==========================================
# VOLUMES POUR PERSISTER LES DONNÉES
# ==========================================
volumes:
  solimus_db_data:

# ==========================================
# RÉSEAU DÉDIÉ POUR LA COMMUNICATION INTERNE
# ==========================================
networks:
  solimus-network:
    driver: bridge