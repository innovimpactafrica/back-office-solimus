version: '3.8'

services:
  # ==========================================
  # SERVICE 1 : LA BASE DE DONNÉES (MySQL)
  # ==========================================
  db:
    image: mysql:8.0
    container_name: solimus-db
    environment:
      MYSQL_DATABASE: ${DB_NAME:-solimus}
      MYSQL_USER: ${DB_USER:-solimus_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-solimus_pass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_pass}
    ports:
      # 3308 est le port exposé sur votre machine locale pour ne pas entrer en conflit 
      # avec une autre base de données locale tournant déjà sur le port 3306.
      - "3308:3306"
    volumes:
      - solimus_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ==========================================
  # SERVICE 2 : L'APPLICATION SPRING BOOT
  # ==========================================
  app:
    build: .
    container_name: solimus-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      
      # Configuration de la base de données pour l'app
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-solimus}
      DB_USER: ${DB_USER:-solimus_user}
      DB_PASSWORD: ${DB_PASSWORD:-solimus_pass}
      
      # Clé JWT
      JWT_SECRET: ${JWT_SECRET:-solimus-secret-key-256-bits-minimum-required-for-security-2026}
      
      # Configuration Email
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      
      # Configuration MinIO
      MINIO_URL: ${MINIO_URL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      
    ports:
      # Expose le port 8085 en externe (pour correspondre à vos tests locaux)
      # et le redirige vers le port interne 8082 configuré dans le conteneur.
      - "8085:8082"
    restart: unless-stopped

# ==========================================
# VOLUMES POUR PERSISTER LES DONNÉES
# ==========================================
volumes:
  solimus_db_data:
